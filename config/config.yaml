genome:
  build: "hg38"
  link: "https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_48/GRCh38.primary_assembly.genome.fa.gz"
  gtf_url: "https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_48/gencode.v48.annotation.gtf.gz"
  blacklist_url: "https://www.encodeproject.org/files/ENCFF356LFX/@@download/ENCFF356LFX.bed.gz"
  repeatmasker_url: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/database/rmsk.txt.gz"
  mappability_url: "https://bismap.hoffmanlab.org/raw/hg38/k50.umap.bed.gz"
  liftOver_chain_url: "https://hgdownload.soe.ucsc.edu/gbdb/hg19/liftOver/hg19ToHg38.over.chain.gz"

rna_seq:
  salmon_dir: "resources/rna-seq"
  sample_regex: "^SU_(?P<rep>[123])(?P<time>00|12|30|60)$"
  time_order: ["0", "12", "30", "60"]
  prefilter_min_count: 10
  prefilter_min_samples: 3
  alpha: 0.05
  annotation_dir: "resources/ref_genomes/hg38_rnaseq_v35"
  gencode_v35_gtf_url: "https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_35/gencode.v35.annotation.gtf.gz"

rna_seq_g4:
  promoter_upstream_bp: 2000
  promoter_downstream_bp: 100
  alpha: 0.05
  background_padj_min: 0.5
  deg_source: "omnibus_lrt"
  tested_gene_universe: true

rna_seq_coseq:
  k_range: "5:15"
  input_matrix: "normalized_counts"
  model: "Normal"
  transformation: "arcsin"
  norm_factors: "none"
  seed: 12345
  nstart: 25
  iter_max: 100
  posterior_min: 0.9

rna_seq_g4_direction:
  effect_size_thresholds: [0.5, 1.0, 1.5]
  min_genes_for_model: 100
  min_deg_for_sign_model: 30
  cluster_min_high_conf_genes: 50

rna_seq_g4_context:
  genesets_dir: "resources/genesets/dna_repair/sets"
  geneset_manifest: "resources/genesets/dna_repair/geneset_manifest.tsv"
  alpha: 0.05
  min_genes_per_g4_status: 3

hic_bams: [
  "0", "12", "30", "60", 
  ]

oqs:
  minus_K:
    bed: "minus_K.bed.gz"
    bed_url: "https://ftp.ncbi.nlm.nih.gov/geo/samples/GSM3003nnn/GSM3003539/suppl/GSM3003539%5FHomo%5Fall%5Fw15%5Fth%2D1%5Fminus.hits.max.K.w50.25.bed.gz"
